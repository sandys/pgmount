apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: openshell-fuse-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: openshell-fuse-device-plugin
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openshell-fuse-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshell-fuse-device-plugin
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: generic-device-plugin
          image: squat/generic-device-plugin:0.1.0
          args:
            - --domain=github.com
            - --device
            - |
              name: fuse
              groups:
                - count: 5000
                  paths:
                    - path: /dev/fuse
          resources:
            requests:
              cpu: 50m
              memory: 10Mi
            limits:
              cpu: 50m
              memory: 20Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
