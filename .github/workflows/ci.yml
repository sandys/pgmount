name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgmount"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-rust-1.85
          cache-workspaces: |
            . -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev

      - name: Build and clippy
        run: |
          cargo clippy --all-targets
          cargo test -p openeral-core --no-run
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: cargo test -p openeral-core

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: openeral
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh
