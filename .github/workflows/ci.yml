name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgmount
          POSTGRES_PASSWORD: pgmount
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openeral"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse3-dev fuse3 pkg-config libpq-dev

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Cache cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-deps-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-1.85-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/**/*.rs') }}
          restore-keys: |
            cargo-target-1.85-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-1.85-

      - name: Build and clippy
        run: |
          cargo clippy --all-targets
          cargo test -p openeral-core --no-run
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"

      - name: Rust integration tests
        env:
          TEST_DATABASE_URL: "host=localhost user=pgmount password=pgmount dbname=testdb"
        run: cargo test -p openeral-core

      - name: FUSE mount integration tests
        env:
          PGPASSWORD: openeral
          DB_CONN: "host=localhost user=pgmount password=pgmount dbname=testdb"
          DB_HOST: localhost
          OPENERAL_TEST_MNT: /mnt/pgtest
        run: |
          sudo mkdir -p /mnt/pgtest
          sudo chmod 777 /mnt/pgtest
          sudo sed -i 's/#user_allow_other/user_allow_other/' /etc/fuse.conf || true
          bash tests/test_fuse_mount.sh
