# Standalone Docker Compose for openeral-shell.
#
# For OpenShell native usage instead:
#   openshell sandbox build openeral-shell
#   openshell sandbox create --from openeral-shell \
#     -e DATABASE_URL="postgres://user:pass@host/db" \
#     -- openeral-shell-start

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: openeral
      POSTGRES_PASSWORD: openeral
      POSTGRES_DB: openeral
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openeral"]
      interval: 2s
      timeout: 5s
      retries: 10

  openeral-shell:
    build:
      context: ..
      dockerfile: openeral-shell/Dockerfile
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "host=postgres user=openeral password=openeral dbname=openeral"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    user: root
    entrypoint: ["openeral-shell-start"]
    command: ["sleep", "infinity"]
    stdin_open: true
    tty: true

volumes:
  pgdata:
